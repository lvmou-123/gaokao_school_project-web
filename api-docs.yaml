openapi: 3.0.1
info:
  title: 高考志愿填报助手 API
  description: 高考志愿填报小程序后端接口文档，支持院校查询、专业查询、AI 智能推荐等功能
  contact:
    name: 开发团队
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearer-jwt: []
tags:
- name: 认证管理
  description: 用户注册、登录（手机验证码 + 微信小程序）
- name: 院校收藏
  description: 用户收藏/取消收藏院校，查看收藏列表
- name: 院校推荐
  description: 基于用户成绩和偏好生成个性化院校推荐列表
- name: 专业管理
  description: 高等院校专业信息查询，支持按名称模糊搜索和学科门类筛选
- name: 志愿管理
  description: 用户志愿表管理，支持创建、查询和修改志愿状态
- name: 用户管理
  description: 用户信息管理、注册与资料查询
- name: 院校管理
  description: 全国高等院校信息查询，支持按省份、标签、关键词筛选和分页
- name: AI 助手
  description: 基于智谱GLM-4.5的智能志愿填报咨询助手
paths:
  /api/users/{id}/scores:
    put:
      tags:
      - 用户管理
      summary: 更新用户成绩
      description: 更新用户的高考成绩、排名、考试类型等信息
      operationId: updateScores
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserScoreRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultUserResponse'
  /api/applications/{id}/status:
    put:
      tags:
      - 志愿管理
      summary: 更新志愿状态
      description: 更新指定志愿的状态（draft / submitted / admitted）
      operationId: updateStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        description: 新状态：draft（草稿）、submitted（已提交）、admitted（已录取）
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultApplicationResponse'
  /api/users/register:
    post:
      tags:
      - 用户管理
      summary: 用户注册
      description: 用户名密码注册（非微信/短信注册方式）
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultUserResponse'
  /api/schools:
    get:
      tags:
      - 院校管理
      summary: 搜索院校
      description: 根据关键词、省份、标签等条件分页搜索院校
      operationId: search
      parameters:
      - name: keyword
        in: query
        description: 搜索关键词（匹配院校名称）
        required: false
        schema:
          type: string
      - name: province
        in: query
        description: 所在省份
        required: false
        schema:
          type: string
      - name: tag
        in: query
        description: 标签（如：985/211/双一流/普通本科/普通专科）
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: 页码（从0开始）
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: 每页条数
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultPageResultSchoolResponse'
    post:
      tags:
      - 院校管理
      summary: 新增院校
      description: 添加一所新的高等院校信息（管理端接口）
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultSchoolResponse'
  /api/recommendations:
    post:
      tags:
      - 院校推荐
      summary: 智能推荐
      description: 根据用户成绩、排名、省份和偏好生成冲刺/稳妥/保底三个梯度的院校推荐
      operationId: recommend
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultListRecommendResponse'
  /api/majors:
    get:
      tags:
      - 专业管理
      summary: 搜索专业
      description: 根据关键词、学科门类等条件分页搜索专业，或查询某院校下的全部专业
      operationId: list
      parameters:
      - name: schoolId
        in: query
        description: 所属院校ID（指定后查询该校全部专业）
        required: false
        schema:
          type: integer
          format: int64
      - name: keyword
        in: query
        description: 搜索关键词（匹配专业名称）
        required: false
        schema:
          type: string
      - name: category
        in: query
        description: 学科门类（如：工学、理学、医学）
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: 页码（从0开始）
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: 每页条数
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultObject'
    post:
      tags:
      - 专业管理
      summary: 新增专业
      description: 添加一个新专业（管理端接口）
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MajorRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultMajorResponse'
  /api/favorites/schools/{schoolId}:
    post:
      tags:
      - 院校收藏
      summary: 收藏院校
      description: 收藏指定的院校
      operationId: addFavorite
      parameters:
      - name: schoolId
        in: path
        description: 院校ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
    delete:
      tags:
      - 院校收藏
      summary: 取消收藏
      description: 取消收藏指定的院校
      operationId: removeFavorite
      parameters:
      - name: schoolId
        in: path
        description: 院校ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
  /api/auth/sms:
    post:
      tags:
      - 认证管理
      summary: 发送短信验证码
      description: 向指定手机号发送6位数字验证码，验证码有效期为5分钟
      operationId: sendSms
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSmsRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
  /api/auth/register:
    post:
      tags:
      - 认证管理
      summary: 手机号注册
      description: 通过手机号+验证码注册新用户，自动返回JWT令牌
      operationId: register_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultAuthResponse'
  /api/auth/login/wechat:
    post:
      tags:
      - 认证管理
      summary: 微信小程序登录
      description: 通过微信code换取openId，新用户自动注册，返回JWT令牌
      operationId: loginByWeChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeChatLoginRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultAuthResponse'
  /api/auth/login/phone:
    post:
      tags:
      - 认证管理
      summary: 手机号登录
      description: 通过手机号+验证码快速登录，新用户自动注册
      operationId: loginByPhone
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultAuthResponse'
  /api/applications:
    post:
      tags:
      - 志愿管理
      summary: 添加志愿
      description: 为用户添加一条志愿记录（含院校、专业和优先级）
      operationId: create_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultApplicationResponse'
  /api/ai/chat:
    post:
      tags:
      - AI 助手
      summary: AI 对话
      description: 向AI助手发送志愿填报相关问题，可附带用户成绩信息获取个性化建议
      operationId: chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultChatResponse'
  /api/users/{id}:
    get:
      tags:
      - 用户管理
      summary: 查询用户信息
      description: 根据用户ID获取用户基本信息
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultUserResponse'
  /api/schools/{id}:
    get:
      tags:
      - 院校管理
      summary: 查询院校详情
      description: 根据院校ID获取详细信息，包含标签列表
      operationId: getById_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultSchoolResponse'
  /api/schools/by-major/{majorId}:
    get:
      tags:
      - 院校管理
      summary: 根据专业查询开设院校
      description: 根据专业ID查询开设该专业的院校列表，支持分页（按专业名称匹配）
      operationId: getSchoolsByMajor
      parameters:
      - name: majorId
        in: path
        description: 专业ID
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        description: 页码（从0开始）
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: 每页条数
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultPageResultSchoolResponse'
  /api/recommendations/history/{userId}:
    get:
      tags:
      - 院校推荐
      summary: 推荐历史
      description: 查询指定用户的推荐历史记录
      operationId: history
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultListRecommendResponse'
  /api/majors/{id}:
    get:
      tags:
      - 专业管理
      summary: 查询专业详情
      description: 根据专业ID获取详细信息
      operationId: getById_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultMajorResponse'
  /api/favorites/schools:
    get:
      tags:
      - 院校收藏
      summary: 收藏列表
      description: 分页获取当前用户的院校收藏列表
      operationId: listFavorites
      parameters:
      - name: page
        in: query
        description: 页码（从0开始）
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: 每页条数
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultPageResultFavoriteSchoolResponse'
  /api/favorites/schools/check/{schoolId}:
    get:
      tags:
      - 院校收藏
      summary: 检查收藏状态
      description: 检查当前用户是否已收藏指定的院校
      operationId: checkFavorite
      parameters:
      - name: schoolId
        in: path
        description: 院校ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
