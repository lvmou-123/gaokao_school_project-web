                $ref: '#/components/schemas/ResultVoid'
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                oneOf:
                - $ref: '#/components/schemas/ResultMapStringString'
                - $ref: '#/components/schemas/ResultVoid'
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ResultListApplicationResponse'
