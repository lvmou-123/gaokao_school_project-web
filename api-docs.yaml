      tags:
      - 志愿管理
      summary: 查询用户志愿列表
      description: 查询指定用户的所有志愿记录，按优先级排序
      operationId: listByUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "500":
          description: Internal Server Error
          content:
            '*/*':
